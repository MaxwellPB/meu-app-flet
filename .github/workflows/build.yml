name: Build APK
on: [push]

# Define a variável de ambiente globalmente para o workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # v4 já suporta Node 24 em runners atualizados

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5 # Atualizado para v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Flet Build APK
        run: |
          # O verbose ajuda a identificar falhas se a tela preta persistir
          flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4 # v4 é a mais estável para Node 24
        with:
          name: meu-app-final
          path: build/apk/*.apk
          if-no-files-found: error
